version: 2.1

orbs:
  codecov: codecov/codecov@5

jobs:
  validate:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - restore_cache:
          keys:
            - node-deps-v1-{{ checksum "package-lock.json" }}
            - node-deps-v1-
      - run:
          name: Install dependencies
          command: |
            set -euo pipefail
            npm ci --include=optional
            npm ls @rolldown/binding-linux-x64-gnu >/dev/null 2>&1 || npm install --no-save @rolldown/binding-linux-x64-gnu
      - save_cache:
          key: node-deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Type check
          command: npm run check
      - run:
          name: Unit and integration tests
          command: npm test
      - run:
          name: Route end-to-end tests
          command: npm run test:e2e
      - run:
          name: Coverage report
          command: npm run test:coverage
      - store_artifacts:
          path: coverage
          destination: coverage
      - persist_to_workspace:
          root: .
          paths:
            - coverage

  upload_codecov:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - attach_workspace:
          at: .
      - codecov/upload:
          files: coverage/coverage-final.json
          flags: vitest

  deploy_sandbox:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - restore_cache:
          keys:
            - node-deps-v1-{{ checksum "package-lock.json" }}
            - node-deps-v1-
      - run:
          name: Install dependencies
          command: |
            set -euo pipefail
            npm ci --include=optional
            npm ls @rolldown/binding-linux-x64-gnu >/dev/null 2>&1 || npm install --no-save @rolldown/binding-linux-x64-gnu
      - run:
          name: Sync sandbox Worker runtime secrets
          command: |
            set -euo pipefail

            put_required() {
              var_name="$1"
              secret_name="$2"
              value="${!var_name:-}"

              if [ -z "$value" ]; then
                echo "Missing required CircleCI variable: $var_name"
                exit 1
              fi

              printf '%s' "$value" | npx wrangler secret put "$secret_name" --name daraja-mcp-server-sandbox
            }

            put_optional() {
              var_name="$1"
              secret_name="$2"
              value="${!var_name:-}"

              if [ -n "$value" ]; then
                printf '%s' "$value" | npx wrangler secret put "$secret_name" --name daraja-mcp-server-sandbox
              fi
            }

            put_required SANDBOX_API_KEY API_KEY
            put_required SANDBOX_DARAJA_CONSUMER_KEY DARAJA_CONSUMER_KEY
            put_required SANDBOX_DARAJA_CONSUMER_SECRET DARAJA_CONSUMER_SECRET
            put_required SANDBOX_DARAJA_SHORTCODE DARAJA_SHORTCODE
            put_required SANDBOX_DARAJA_PASSKEY DARAJA_PASSKEY
            put_required SANDBOX_DARAJA_CALLBACK_URL DARAJA_CALLBACK_URL

            put_optional SANDBOX_DARAJA_ENV DARAJA_ENV
            put_optional SANDBOX_DARAJA_BASE_URL DARAJA_BASE_URL
            put_optional SANDBOX_DARAJA_TRANSACTION_TYPE DARAJA_TRANSACTION_TYPE
      - run:
          name: Generate sandbox deploy config with KV namespace IDs
          command: node scripts/generate-wrangler-sandbox-config.mjs
      - run:
          name: Deploy sandbox worker
          command: npx wrangler deploy --name daraja-mcp-server-sandbox -c .wrangler.sandbox.toml

  smoke_sandbox:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Smoke test health endpoint
          command: |
            set -euo pipefail
            health_status=$(curl -sS -o /tmp/health.json -w "%{http_code}" "${SANDBOX_SERVICE_BASE_URL}/health")
            test "$health_status" = "200"
            grep -q '"ok":true' /tmp/health.json || grep -q '"ok": true' /tmp/health.json
      - run:
          name: Smoke test MCP tools endpoint
          command: |
            set -euo pipefail
            tools_status=$(curl -sS -o /tmp/tools.json -w "%{http_code}" -H "x-api-key: ${SANDBOX_MCP_API_KEY}" "${SANDBOX_SERVICE_BASE_URL}/mcp/tools")
            test "$tools_status" = "200"
            grep -q '"tools"' /tmp/tools.json
      - run:
          name: Smoke test protected route unauthorized response
          command: |
            set -euo pipefail
            unauthorized_status=$(curl -sS -o /tmp/mcp-unauthorized.json -w "%{http_code}" -X POST -H "content-type: application/json" -d '{}' "${SANDBOX_SERVICE_BASE_URL}/mcp")
            test "$unauthorized_status" = "401"
      - run:
          name: Smoke test callback route accessibility
          command: |
            set -euo pipefail
            callback_status=$(curl -sS -o /tmp/callback.json -w "%{http_code}" -X POST -H "content-type: application/json" -d '{}' "${SANDBOX_SERVICE_BASE_URL}/callback")
            case "$callback_status" in
              200|400)
                ;;
              *)
                echo "Unexpected callback status: $callback_status"
                exit 1
                ;;
            esac

workflows:
  upload-to-codecov:
    jobs:
      - validate
      - upload_codecov:
          requires:
            - validate

  ci_cd:
    jobs:
      - validate:
          filters:
            tags:
              only: /.*/
      - deploy_sandbox:
          requires:
            - validate
          filters:
            branches:
              only: main
            tags:
              ignore: /.*/
