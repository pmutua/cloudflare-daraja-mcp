name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "sandbox"
        type: choice
        options:
          - sandbox
          - production

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Unit and integration tests
        run: npm test

      - name: Route end-to-end tests
        run: npm run test:e2e

  deploy-sandbox:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.target == 'sandbox')
    environment: sandbox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy sandbox worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --name daraja-mcp-server-sandbox

  smoke-sandbox:
    runs-on: ubuntu-latest
    needs: deploy-sandbox
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.target == 'sandbox')
    environment: sandbox

    steps:
      - name: Smoke test health endpoint
        env:
          SERVICE_BASE_URL: ${{ secrets.SERVICE_BASE_URL }}
        run: |
          set -euo pipefail
          health_status=$(curl -sS -o /tmp/health.json -w "%{http_code}" "${SERVICE_BASE_URL}/health")
          test "$health_status" = "200"
          grep -q '"ok":true' /tmp/health.json || grep -q '"ok": true' /tmp/health.json

      - name: Smoke test MCP tools endpoint
        env:
          SERVICE_BASE_URL: ${{ secrets.SERVICE_BASE_URL }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
        run: |
          set -euo pipefail
          tools_status=$(curl -sS -o /tmp/tools.json -w "%{http_code}" -H "x-api-key: ${MCP_API_KEY}" "${SERVICE_BASE_URL}/mcp/tools")
          test "$tools_status" = "200"
          grep -q '"tools"' /tmp/tools.json

      - name: Smoke test protected route unauthorized response
        env:
          SERVICE_BASE_URL: ${{ secrets.SERVICE_BASE_URL }}
        run: |
          set -euo pipefail
          unauthorized_status=$(curl -sS -o /tmp/mcp-unauthorized.json -w "%{http_code}" -X POST -H "content-type: application/json" -d '{}' "${SERVICE_BASE_URL}/mcp")
          test "$unauthorized_status" = "401"

      - name: Smoke test callback route accessibility
        env:
          SERVICE_BASE_URL: ${{ secrets.SERVICE_BASE_URL }}
        run: |
          set -euo pipefail
          callback_status=$(curl -sS -o /tmp/callback.json -w "%{http_code}" -X POST -H "content-type: application/json" -d '{}' "${SERVICE_BASE_URL}/callback")
          case "$callback_status" in
            200|400)
              ;;
            *)
              echo "Unexpected callback status: $callback_status"
              exit 1
              ;;
          esac

  deploy-production:
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy production worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy

  smoke-production:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    environment: production

    steps:
      - name: Smoke test health endpoint
        env:
          SERVICE_BASE_URL: ${{ secrets.SERVICE_BASE_URL }}
        run: |
          set -euo pipefail
          health_status=$(curl -sS -o /tmp/health.json -w "%{http_code}" "${SERVICE_BASE_URL}/health")
          test "$health_status" = "200"
          grep -q '"ok":true' /tmp/health.json || grep -q '"ok": true' /tmp/health.json

      - name: Smoke test MCP tools endpoint
        env:
          SERVICE_BASE_URL: ${{ secrets.SERVICE_BASE_URL }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
        run: |
          set -euo pipefail
          tools_status=$(curl -sS -o /tmp/tools.json -w "%{http_code}" -H "x-api-key: ${MCP_API_KEY}" "${SERVICE_BASE_URL}/mcp/tools")
          test "$tools_status" = "200"
          grep -q '"tools"' /tmp/tools.json

      - name: Smoke test protected route unauthorized response
        env:
          SERVICE_BASE_URL: ${{ secrets.SERVICE_BASE_URL }}
        run: |
          set -euo pipefail
          unauthorized_status=$(curl -sS -o /tmp/mcp-unauthorized.json -w "%{http_code}" -X POST -H "content-type: application/json" -d '{}' "${SERVICE_BASE_URL}/mcp")
          test "$unauthorized_status" = "401"

      - name: Smoke test callback route accessibility
        env:
          SERVICE_BASE_URL: ${{ secrets.SERVICE_BASE_URL }}
        run: |
          set -euo pipefail
          callback_status=$(curl -sS -o /tmp/callback.json -w "%{http_code}" -X POST -H "content-type: application/json" -d '{}' "${SERVICE_BASE_URL}/callback")
          case "$callback_status" in
            200|400)
              ;;
            *)
              echo "Unexpected callback status: $callback_status"
              exit 1
              ;;
          esac
